sdk:
  - stable

stages:
  - analyze:
      - group:
          - analyze: --fatal-infos .
          - command:
              - dart pub global activate pana
              - pana --exit-code-threshold 20 --line-length 100 --flutter-sdk
                ${{ steps.flutter-action.outputs.CACHE-PATH }} .
  - unit_test:
      - test: --flavor test .
