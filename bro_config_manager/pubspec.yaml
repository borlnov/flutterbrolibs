name: bro_config_manager
version: "1.0.0"

description: This package contains the configuration manager for your application.
repository: https://github.com/borlnov/flutterbrolibs
topics:
  - manager
  - configuration
  - brolibs
  - shared

environment:
  sdk: ^3.6.0
  flutter: ">=1.17.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter

  equatable: ^2.0.7

  flutter_dotenv: ^5.2.1

  bro_abstract_logger: ^1.0.0

  bro_abstract_manager: ^1.0.0

  bro_file_utility: ^1.0.0

  bro_global_manager: ^1.0.0

  bro_yaml_utility: ^1.0.0

  bro_list_utility: ^1.0.0

  bro_types_utility: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  assets:
    - path: test/assets/config_a/
      flavors:
        - test
    - path: test/assets/config_b/
      flavors:
        - test
    - path: test/assets/config_c/
      flavors:
        - test
